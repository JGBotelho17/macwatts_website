spring.application.name=backend

# Destinatário interno para receber os pedidos de orçamento
app.company.email=macwattsteste@gmail.com

# SMTP (obrigatório para enviar emails)
# Exemplo com Gmail SMTP:
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remetente do email (se não definido, usa spring.mail.username)
app.mail.from=${MAIL_FROM:${spring.mail.username:no-reply@localhost}}

# Envio real de email (falha se SMTP não estiver configurado).
app.mail.skip-when-smtp-missing=false

# Frontends autorizados a chamar /api/** (separados por virgula)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500}

# Integracao Odoo CRM
app.odoo.enabled=${APP_ODOO_ENABLED:false}
app.odoo.base-url=${APP_ODOO_BASE_URL:}
app.odoo.db=${APP_ODOO_DB:}
app.odoo.username=${APP_ODOO_USERNAME:}
app.odoo.password=${APP_ODOO_PASSWORD:}
